<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoDM Feedback — Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 頁首:brand 用 admin 版本(顯示 // ADMIN) -->
<header>
  <div class="brand" data-i18n="brand_admin">CODM // ADMIN</div>
  <nav>
    <a href="index.html" data-i18n="nav_home">Home</a>
    <button id="lang-toggle" data-i18n="lang_toggle">中文</button>
    <!-- logout 鈕僅在已登入時顯示,由 JS 控制 style.display -->
    <button id="logout" style="display:none" data-i18n="logout">Logout</button>
  </nav>
</header>

<main id="main"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="common.js"></script>

<script>
// ================================================================
//  admin.html 頁面腳本
// ----------------------------------------------------------------
//  兩種狀態,由 sb.auth.getSession() 決定:
//    - 未登入 → 顯示 email/password 登入表單
//    - 已登入 → 顯示待審核佇列(bugs + suggestions 混排),
//              每項可 Approve(UPDATE approved=true)或 Reject(DELETE)
//
//  重要安全考量:
//    - 未登入時「畫面上不會出現任何未審核內容」— 因為 RLS 的
//      SELECT to authenticated 條件不成立,anon SELECT 只有 approved=true,
//      這裡我們在 JS 也 gate 一次,不 gate 也不會漏但 UX 較差。
//    - 就算有人直接改 HTML 讓登入表單消失,DB 端還是擋 —
//      前端 gate 只是 UX,不是安全防線。
// ================================================================


// 語言切換後重新渲染 → 掛 window.rerender
window.rerender = render;


// ─── 主渲染入口 ───────────────────────────
async function render() {
  applyI18n();

  // 檢查目前 session
  // 有 session → 已登入 → 顯示佇列
  // 沒 session → 未登入 → 顯示登入表單
  const { data: { session } } = await sb.auth.getSession();

  const logoutBtn = document.getElementById('logout');

  if (!session) {
    logoutBtn.style.display = 'none';
    return renderLogin();
  }

  // 已登入才顯示 logout 鈕(共用頁首元件,依狀態切換顯隱)
  logoutBtn.style.display = '';

  // 用 URL ?mode=pending / ?mode=approved 分頁,重整可回到同一分頁
  const params = new URLSearchParams(location.search);
  const mode = params.get('mode') === 'approved' ? 'approved' : 'pending';
  return renderAdminList(mode);
}


// ═══════════════════════════════════════════════
//  [未登入] renderLogin
// ───────────────────────────────────────────────
//  Supabase Auth 的 email/password 登入。
//  之所以「一定要用真的 Supabase Auth」是因為:
//    - 只有 authenticated role 才符合 RLS 的 update/delete 政策
//    - 假登入(前端記個 flag)完全繞不過 RLS,行為會壞掉
// ═══════════════════════════════════════════════
function renderLogin() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <form id="login-form" class="form">
      <h2>${t('login')}</h2>

      <label>${t('f_email')}
        <input type="email" name="email" required autocomplete="username">
      </label>

      <label>${t('f_password')}
        <input type="password" name="password" required autocomplete="current-password">
      </label>

      <button type="submit" class="btn">${t('do_login')}</button>
      <div class="status" id="login-status"></div>
    </form>
  `;

  document.getElementById('login-form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const form   = ev.currentTarget;
    const status = form.querySelector('#login-status');
    const btn    = form.querySelector('button[type=submit]');

    btn.disabled = true;
    status.className = 'status';
    status.textContent = '';

    const email    = form.email.value;
    const password = form.password.value;

    // Supabase 官方 API:signInWithPassword
    // 成功會自動把 session 存到 localStorage,下一次 getSession 就找得到。
    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      status.className = 'status err';
      status.textContent = t('err_prefix') + error.message;
      btn.disabled = false;
      return;
    }

    // 登入成功 → 直接重繪,會走到 renderAdminList()
    render();
  });
}


// ═══════════════════════════════════════════════
//  [已登入] renderAdminList
// ───────────────────────────────────────────────
//  管理頁分兩種模式(用上方 tab 切換):
//    pending  → 顯示 approved=false,提供 Approve / Reject
//    approved → 顯示 approved=true ,提供 Edit    / Delete
//
//  設計要點:
//    - 兩張表(bugs / suggestions)混排顯示,card 上標 __type
//    - Approve 用 UPDATE approved=true;Reject 用 DELETE(未審核可直刪)
//    - Edit 就地展開表單,存到 DB 後回到閱讀狀態
//    - Delete 需二次確認(confirm),避免誤刪
// ═══════════════════════════════════════════════
async function renderAdminList(mode) {
  const main = document.getElementById('main');
  const isPending = mode === 'pending';

  main.innerHTML = `
    <div class="tabs">
      <a href="?mode=pending"  class="${isPending ? 'active' : ''}">${t('admin_tab_pending')}</a>
      <a href="?mode=approved" class="${isPending ? '' : 'active'}">${t('admin_tab_approved')}</a>
    </div>
    <div class="empty">${t('loading')}</div>
  `;

  // 平行抓兩張表
  const approvedFilter = isPending ? false : true;
  const [bugsRes, sugsRes] = await Promise.all([
    sb.from('bugs')
      .select('*')
      .eq('approved', approvedFilter)
      .order('created_at', { ascending: isPending }),   // pending: 舊→新;approved: 新→舊
    sb.from('suggestions')
      .select('*')
      .eq('approved', approvedFilter)
      .order('created_at', { ascending: isPending })
  ]);

  if (bugsRes.error || sugsRes.error) {
    const msg = (bugsRes.error || sugsRes.error).message;
    main.innerHTML = renderTabsBar(isPending) +
      `<div class="empty">${t('err_prefix')}${esc(msg)}</div>`;
    return;
  }

  const items = [
    ...(bugsRes.data || []).map(x => ({ ...x, __type: 'bugs' })),
    ...(sugsRes.data || []).map(x => ({ ...x, __type: 'suggestions' })),
  ];

  // pending:舊 → 新(先進先審);approved:新 → 舊(較新的先看到)
  items.sort((a, b) => isPending
    ? new Date(a.created_at) - new Date(b.created_at)
    : new Date(b.created_at) - new Date(a.created_at));

  const heading = isPending ? t('pending_queue') : t('approved_list');
  const emptyMsg = isPending ? t('no_pending') : t('no_approved');

  if (items.length === 0) {
    main.innerHTML = renderTabsBar(isPending) + `
      <h2 style="font-family:var(--font-cond);text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 20px">
        ${heading}
      </h2>
      <div class="empty">${emptyMsg}</div>
    `;
    return;
  }

  main.innerHTML = renderTabsBar(isPending) + `
    <h2 style="font-family:var(--font-cond);text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin:0 0 20px">
      ${heading} <span class="mono" style="color:var(--muted);font-size:14px">(${items.length})</span>
    </h2>
    ${items.map(r => renderAdminCard(r, isPending)).join('')}
  `;

  // 綁動作鈕
  main.querySelectorAll('[data-action]').forEach(btn => btn.addEventListener('click', onAction));
}


// 頂部 tabs 列(用同一份 renderTabsBar 讓錯誤與空狀態頁面也帶 tabs)
function renderTabsBar(isPending) {
  return `
    <div class="tabs">
      <a href="?mode=pending"  class="${isPending ? 'active' : ''}">${t('admin_tab_pending')}</a>
      <a href="?mode=approved" class="${isPending ? '' : 'active'}">${t('admin_tab_approved')}</a>
    </div>
  `;
}


// ─── 單張管理卡:標題、日期、說明、媒體、動作列 ─────
// pending  模式 → Approve / Reject
// approved 模式 → Edit    / Delete + (bug) 標記已解決 / 取消解決
function renderAdminCard(r, isPending) {
  const isBug = r.__type === 'bugs';
  // bug 顯示 BUG 或 RESOLVED 標籤(已核准且 resolved=true 時顯示 RESOLVED)
  let tag = '';
  if (isBug) {
    tag = r.resolved
      ? `<span class="tag tag-resolved">${t('tag_resolved')}</span>`
      : `<span class="tag tag-bug">${t('tag_bug')}</span>`;
  }
  const media = r.media_url ? renderMedia(r.media_url) : '';
  const voteInfo = !isBug
    ? `<span class="mono" style="color:var(--muted)">▲${r.upvotes} ▼${r.downvotes}</span>`
    : '';

  // 已核准的 bug 額外提供「標記為已解決 / 取消解決」按鈕
  const resolveBtn = (!isPending && isBug)
    ? (r.resolved
        ? `<button data-action="reopen" data-table="${r.__type}" data-id="${r.id}">${t('mark_open')}</button>`
        : `<button data-action="resolve" data-table="${r.__type}" data-id="${r.id}">${t('mark_resolved')}</button>`)
    : '';

  const actions = isPending
    ? `
      <button data-action="approve" data-table="${r.__type}" data-id="${r.id}">
        ${t('approve')}
      </button>
      <button data-action="reject"  data-table="${r.__type}" data-id="${r.id}">
        ${t('reject')}
      </button>
    `
    : `
      ${resolveBtn}
      <button data-action="edit"   data-table="${r.__type}" data-id="${r.id}">
        ${t('edit')}
      </button>
      <button data-action="delete" data-table="${r.__type}" data-id="${r.id}">
        ${t('del')}
      </button>
    `;

  return `
    <article class="admin-card" data-card-id="${r.__type}-${r.id}">
      ${tag}
      <div class="admin-view">
        <h3 class="card-title">${esc(r.title)}</h3>
        <div class="card-meta">
          <span class="mono">#${r.id}</span>
          <span class="mono">${fmtDate(r.created_at)}</span>
          <span class="mono" style="color:var(--muted)">${r.__type}</span>
          ${voteInfo}
        </div>
        <div class="detail-body">${esc(r.description)}</div>
        ${media}
      </div>
      <div class="admin-actions">
        ${actions}
      </div>
    </article>
  `;
}


// ─── 動作處理:approve / reject / edit / delete / resolve / reopen ─────────
async function onAction(ev) {
  const btn = ev.currentTarget;
  const { action, table, id } = btn.dataset;

  if (action === 'edit')     return startEdit(btn, table, id);
  if (action === 'delete')   return doDelete(btn, table, id);
  if (action === 'resolve' || action === 'reopen') {
    return toggleResolved(btn, table, id, action === 'resolve');
  }

  // approve / reject:先鎖鈕再送 DB
  const card = btn.closest('article');
  card.querySelectorAll('button').forEach(b => b.disabled = true);

  let error;
  if (action === 'approve') {
    ({ error } = await sb.from(table).update({ approved: true }).eq('id', Number(id)));
  } else {
    ({ error } = await sb.from(table).delete().eq('id', Number(id)));
  }

  if (error) {
    card.querySelectorAll('button').forEach(b => b.disabled = false);
    alert(error.message);
    return;
  }

  card.remove();
  if (document.querySelectorAll('.admin-card').length === 0) {
    // 佇列空了 → 重繪一次讓 no-pending 訊息出來
    render();
  }
}


// ─── 標記已解決 / 取消解決 ──────────────────────
// UPDATE bugs.resolved = true / false;成功後直接重繪,讓卡上 tag 與
// 按鈕文字同步(懶得就地 patch DOM,直接重新拉一次資料簡單可靠)。
async function toggleResolved(btn, table, id, toResolved) {
  const card = btn.closest('article');
  card.querySelectorAll('button').forEach(b => b.disabled = true);

  const { error } = await sb.from(table)
    .update({ resolved: toResolved })
    .eq('id', Number(id));

  if (error) {
    card.querySelectorAll('button').forEach(b => b.disabled = false);
    alert(error.message);
    return;
  }

  render();
}


// ─── 進入編輯模式:替換掉 admin-view 為表單 ───────────
function startEdit(btn, table, id) {
  const card = btn.closest('article');
  const view = card.querySelector('.admin-view');
  const titleEl = view.querySelector('.card-title');
  const bodyEl  = view.querySelector('.detail-body');

  // 從 DOM 讀目前顯示的內容(HTML esc 後的);先解碼再放回 input,
  // 這樣使用者看到的是原始文字而不是 HTML entity。
  const decode = (s) => {
    const tmp = document.createElement('textarea');
    tmp.innerHTML = s;
    return tmp.value;
  };
  const currentTitle = decode(titleEl.innerHTML);
  const currentBody  = decode(bodyEl.innerHTML);

  // 就地換成表單 —— 保留 tag / meta,不重繪整張卡
  view.innerHTML = `
    <label class="edit-label">
      <span>${t('f_title')}</span>
      <input type="text" class="edit-title" maxlength="200" value="${esc(currentTitle)}">
    </label>
    <label class="edit-label">
      <span>${t('f_desc')}</span>
      <textarea class="edit-desc" rows="6" maxlength="4000">${esc(currentBody)}</textarea>
    </label>
    <div class="status edit-status"></div>
  `;

  // 換動作列:Save / Cancel
  const actionsEl = card.querySelector('.admin-actions');
  actionsEl.innerHTML = `
    <button data-action="save"   data-table="${table}" data-id="${id}">${t('save')}</button>
    <button data-action="cancel" data-table="${table}" data-id="${id}">${t('cancel')}</button>
  `;
  actionsEl.querySelector('[data-action=save]').addEventListener('click', doSave);
  actionsEl.querySelector('[data-action=cancel]').addEventListener('click', () => render());
}


// ─── 儲存編輯 ───────────────────────────────────
async function doSave(ev) {
  const btn = ev.currentTarget;
  const { table, id } = btn.dataset;
  const card = btn.closest('article');
  const titleInput = card.querySelector('.edit-title');
  const bodyInput  = card.querySelector('.edit-desc');
  const status = card.querySelector('.edit-status');

  const newTitle = titleInput.value.trim();
  const newDesc  = bodyInput.value.trim();

  if (!newTitle || !newDesc) {
    status.className = 'status edit-status err';
    status.textContent = t('err_prefix') + 'title / description required';
    return;
  }

  card.querySelectorAll('button').forEach(b => b.disabled = true);
  status.className = 'status edit-status';
  status.textContent = t('submitting');

  const { error } = await sb.from(table)
    .update({ title: newTitle, description: newDesc })
    .eq('id', Number(id));

  if (error) {
    card.querySelectorAll('button').forEach(b => b.disabled = false);
    status.className = 'status edit-status err';
    status.textContent = t('err_prefix') + error.message;
    return;
  }

  // 儲存成功 → 重繪一次讓 UI 回到閱讀狀態並拿最新資料
  render();
}


// ─── 刪除:二次確認 → DB 刪 → DOM 移除 ──────────
async function doDelete(btn, table, id) {
  if (!confirm(t('confirm_delete'))) return;

  const card = btn.closest('article');
  card.querySelectorAll('button').forEach(b => b.disabled = true);

  const { error } = await sb.from(table).delete().eq('id', Number(id));

  if (error) {
    card.querySelectorAll('button').forEach(b => b.disabled = false);
    alert(error.message);
    return;
  }

  card.remove();
  if (document.querySelectorAll('.admin-card').length === 0) {
    render();
  }
}


// ─── 登出鈕:sb.auth.signOut → 清 session → 回登入表單 ──
document.getElementById('logout').addEventListener('click', async () => {
  await sb.auth.signOut();
  render();
});


// ─── 啟動 ────────────────────────────────
render();
</script>

</body>
</html>
