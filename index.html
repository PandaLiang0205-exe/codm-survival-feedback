<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoDM Survival Feedback</title>

  <!-- Google Fonts:窄體 + 等寬。只兩支,加載成本可接受。 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Supabase CDN 預連線:提早做 DNS/TCP/TLS 握手,首次載入可省 ~200-500ms。
       兩支都放,備援 CDN(unpkg) 也順便暖起來,萬一主 CDN 慢時切換不用再等握手。 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>

  <link rel="stylesheet" href="style.css">

  <!-- ═══════════════════════════════════════════════════════════
       Supabase SDK bootstrap loader(head 內立刻執行,越早越好)
       ───────────────────────────────────────────────────────────
       為什麼不用 <script src="..." onerror="..."> 舊寫法:
         onerror 只在「明確失敗」(404/連線 reset)才會觸發,
         「慢到不回應」(常見於跨海冷 cache 的 jsDelivr)完全不觸發,
         結果就是使用者盯著 Loading... 永遠等下去。
       這裡改用 JS loader + timeout,兩支 CDN 都超時才放棄。
       window.__sdkReady 是一個 Promise,common.js 與 inline script
       都掛在上面等,SDK 準備好才會 build client / 開始 render。
       ═══════════════════════════════════════════════════════════ -->
  <script>
  (function bootstrapSupabase() {
    // 兩支 CDN 依序嘗試;順序按可靠度:jsDelivr 主、unpkg 備。
    const CDNS = [
      'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2',
      'https://unpkg.com/@supabase/supabase-js@2'
    ];
    // 4 秒是經驗值:一般 CDN 命中 < 1s,冷 cache 也應該 2-3s。
    // 超過 4s 極可能是這支 CDN 出狀況,不如換一支。
    const TIMEOUT_MS = 4000;

    window.__sdkReady = new Promise((resolve, reject) => {
      let idx = 0;
      (function tryNext() {
        if (idx >= CDNS.length) {
          return reject(new Error('all-cdn-failed'));
        }
        const url = CDNS[idx++];
        const s = document.createElement('script');
        s.src = url;
        // 三種結束情況:onload(成功)、onerror(硬失敗)、timeout(慢到放棄)
        // 任何一個先發生就把其他兩個關掉,避免重複觸發。
        const timer = setTimeout(() => {
          s.onload = s.onerror = null;
          s.remove();
          console.warn('[sdk] timeout on', url);
          tryNext();
        }, TIMEOUT_MS);
        s.onload = () => {
          clearTimeout(timer);
          console.log('[sdk] loaded from', url);
          resolve();
        };
        s.onerror = () => {
          clearTimeout(timer);
          console.warn('[sdk] error on', url);
          tryNext();
        };
        document.head.appendChild(s);
      })();
    });
  })();
  </script>
</head>
<body>

<!-- ───────────────────────────────────────────────
     頁首:品牌 + 導航 + 語言切換
     所有靜態文字用 data-i18n,語言切換時 common.js 會自動更新。
     ─────────────────────────────────────────────── -->
<header>
  <div class="brand" data-i18n="brand_home">CODM // SURVIVAL // FEEDBACK</div>
  <nav>
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="admin.html" data-i18n="nav_admin">Admin</a>
    <button id="lang-toggle" data-i18n="lang_toggle">中文</button>
  </nav>
</header>

<!-- 主容器:所有動態內容都由 JS 塞進 #main。
     先塞一個 loading 佔位符,萬一 JS 沒跑起來(CDN 掛/檔案 404)也不會黑屏。 -->
<main id="main">
  <div class="empty">Loading... 載入中...</div>
</main>

<noscript>
  <div style="padding:40px;text-align:center;color:#d0d0d0;">
    This site requires JavaScript. 請啟用 JavaScript。
  </div>
</noscript>


<!-- ───────────────────────────────────────────────
     載入順序:
       1. supabase SDK — 已由 <head> 內的 bootstrap loader 開始載入,
          結果透過 window.__sdkReady Promise 回報
       2. config.js    — 提供 SUPABASE_URL / KEY(不依賴 SDK,可先執行)
       3. common.js    — 掛在 __sdkReady 上,SDK 好了才 createClient
       4. 頁面腳本      — 一樣掛在 __sdkReady 上才 render
     ─────────────────────────────────────────────── -->
<script src="config.js"></script>
<script src="common.js"></script>

<script>
// ================================================================
//  index.html 頁面腳本
// ----------------------------------------------------------------
//  這個檔案處理三種「頁面模式」,全部用 URL 參數決定,不用路由庫:
//    - ?tab=bugs / ?tab=suggestions        → 列表(預設 bugs)
//    - ?view=detail&type=bug|suggestion&id=N → 詳情
//    - ?view=submit&type=bug|suggestion    → 提交表單
//
//  設計理由:
//    - 純 URL 參數 → 可分享連結、可上一頁、無 modal 狀態管理
//    - 一個 render() 入口,依 params 分派 → 邏輯扁平好讀
// ================================================================


// ─── 主渲染入口 ───────────────────────────────
// 讀 URL 參數決定要渲染哪個 view。
// 語言切換後 common.js 會呼叫 window.rerender,所以把 render 掛上去。
async function render() {
  applyI18n();                                // 先把 header 等靜態文字翻好

  // 每個 session 只 +1 visits 一次,避免使用者狂切 tab 灌爆計數。
  // 用 sessionStorage(不是 localStorage) → 關掉分頁就重置,對「訪問人次」定義較合理。
  maybeIncrementVisits();

  const params = new URLSearchParams(location.search);
  const view = params.get('view') || 'list';
  const type = params.get('type');
  const id   = params.get('id');
  const tab  = params.get('tab') || 'bugs';   // 列表預設看 bugs
  const status = params.get('status') || 'open';  // bugs 專用:open / resolved

  const main = document.getElementById('main');

  if (view === 'detail' && type && id) {
    return renderDetail(main, type, id);
  }
  if (view === 'submit' && type) {
    return renderSubmit(main, type);
  }
  return renderList(main, tab, status);
}


// ─── 訪問計數 (fire-and-forget) ───────────────
// 呼叫 increment_visits RPC,不 await 也不管失敗 → 統計是「錦上添花」,
// 網路壞掉不該擋住頁面渲染。
//
// DEBUG 模式:目前把 RPC 的成功/失敗都印到 console,方便查
// 「瀏覽次數不會變」的原因(RPC 沒部署?權限錯?回傳異常?)
// 排除完問題後可以把 log 拿掉。
function maybeIncrementVisits() {
  if (sessionStorage.getItem('visited') === '1') {
    console.log('[visits] 本 session 已 +1,跳過');
    return;
  }
  sessionStorage.setItem('visited', '1');
  sb.rpc('increment_visits').then(res => {
    if (res.error) {
      console.error('[visits] RPC 失敗:', res.error);
    } else {
      console.log('[visits] RPC 成功,累計 =', res.data);
    }
  }).catch(err => {
    console.error('[visits] RPC 例外:', err);
  });
}
// 把入口暴露給 common.js 的語言切換用
window.rerender = render;


// ═══════════════════════════════════════════════
//  [列表模式] renderList
// ───────────────────────────────────────────────
//  顯示 tabs、新增按鈕、搜尋欄、排序、卡片列表。
//  資料來源:approved=true 的 bugs 或 suggestions。
//  因為 RLS 政策擋在 DB 層,anon 就算沒加 .eq('approved', true)
//  也只能看到已審核 —— 但這裡還是加上作為文件化意圖。
//
//  搜尋 + 排序策略:
//    - 一次把所有已核准資料抓下來存在 window._listCache
//    - 搜尋 / 排序都在前端做,避免每個按鍵都打 DB
//    - 這樣做的前提是資料量不會爆(遊戲意見板規模上是合理的)
// ═══════════════════════════════════════════════
async function renderList(main, tab, status) {
  const isBugs = tab === 'bugs';
  const table  = isBugs ? 'bugs' : 'suggestions';
  // status 只在 bugs 分頁生效:'open' = 未解決 / 'resolved' = 已解決
  const showResolved = isBugs && status === 'resolved';

  // 骨架先出來,資料再填 —— 避免看到「白畫面 → 突然全出現」
  // 搜尋列 + 排序控制項:給 bugs 也給 suggestions;
  // 但 bugs 沒有支持度概念,所以「支持度最高」排序只給 suggestions。
  const sortOptions = isBugs
    ? `
        <option value="newest">${t('sort_newest')}</option>
        <option value="oldest">${t('sort_oldest')}</option>
      `
    : `
        <option value="newest">${t('sort_newest')}</option>
        <option value="oldest">${t('sort_oldest')}</option>
        <option value="top">${t('sort_top')}</option>
      `;

  // BUG 分頁專屬的「未解決 / 已解決」切換條
  const statusBar = isBugs ? `
    <div class="status-bar">
      <a href="?tab=bugs&status=open"     class="pill ${showResolved ? '' : 'active'}">${t('filter_open')}</a>
      <a href="?tab=bugs&status=resolved" class="pill ${showResolved ? 'active' : ''}">${t('filter_resolved')}</a>
    </div>
  ` : '';

  main.innerHTML = `
    <div id="site-stats" class="site-stats">
      <span class="stat"><span class="stat-label">${t('stats_bugs')}</span> <b class="stat-val mono" data-stat="bugs">–</b></span>
      <span class="stat"><span class="stat-label">${t('stats_suggestions')}</span> <b class="stat-val mono" data-stat="suggestions">–</b></span>
      <span class="stat"><span class="stat-label">${t('stats_views')}</span> <b class="stat-val mono" data-stat="visits">–</b></span>
    </div>
    <div class="tabs">
      <a href="?tab=bugs"        class="${isBugs ? 'active' : ''}">${t('tab_bugs')}</a>
      <a href="?tab=suggestions" class="${isBugs ? '' : 'active'}">${t('tab_suggestions')}</a>
    </div>
    ${statusBar}
    <div class="actions">
      <a href="?view=submit&type=${isBugs ? 'bug' : 'suggestion'}" class="btn">
        ${isBugs ? t('new_bug') : t('new_suggestion')}
      </a>
    </div>
    <div class="toolbar">
      <input id="search-input" type="text" placeholder="${t('search_placeholder')}" autocomplete="off">
      <label class="sort-label">
        <span>${t('sort_label')}</span>
        <select id="sort-select">${sortOptions}</select>
      </label>
    </div>
    <div id="list" class="list"><div class="empty">${t('loading')}</div></div>
  `;

  // stats 三個獨立 query,不擋主列表渲染 → fire-and-forget
  loadSiteStats();

  // 抓資料:RLS 已經濾掉未審核,這裡再過一次是防禦性寫法。
  // 排序在前端做,DB 這裡只固定用 created_at desc 拿全部,少一次 orderBy。
  // BUG 分頁按 status 再過一次 resolved 欄位。
  let query = sb.from(table).select('*').eq('approved', true);
  if (isBugs) query = query.eq('resolved', showResolved);
  query = query.order('created_at', { ascending: false });
  const { data, error } = await query;

  const listEl = document.getElementById('list');

  if (error) {
    listEl.innerHTML = `<div class="empty">${t('err_prefix')}${esc(error.message)}</div>`;
    return;
  }

  // 把資料 + 狀態存在 window,搜尋/排序改變時直接重繪不重打 DB
  window._listCache = {
    isBugs,
    data: data || [],
    keyword: '',
    sort: 'newest'
  };

  // 綁事件:input 邊打邊搜尋、select 換排序即重繪
  document.getElementById('search-input').addEventListener('input', (ev) => {
    window._listCache.keyword = ev.target.value.trim().toLowerCase();
    renderFilteredList();
  });
  document.getElementById('sort-select').addEventListener('change', (ev) => {
    window._listCache.sort = ev.target.value;
    renderFilteredList();
  });

  renderFilteredList();
}


// ─── 抓 stats 並填進右上角 stats bar ─────────
// 三個 query 平行:
//   bugs count / suggestions count → head request 只拿 count,不拉 row
//   visits → 從 site_stats 讀
// 任何一項失敗就顯示 –(dash),不擋整頁。
async function loadSiteStats() {
  const [bugsRes, sugsRes, statsRes] = await Promise.all([
    sb.from('bugs').select('*', { count: 'exact', head: true }).eq('approved', true),
    sb.from('suggestions').select('*', { count: 'exact', head: true }).eq('approved', true),
    sb.from('site_stats').select('visits').eq('id', 1).maybeSingle(),
  ]);

  const setStat = (name, val) => {
    const el = document.querySelector(`[data-stat="${name}"]`);
    if (el) el.textContent = (val == null) ? '–' : Number(val).toLocaleString();
  };
  setStat('bugs',        bugsRes.error ? null : bugsRes.count);
  setStat('suggestions', sugsRes.error ? null : sugsRes.count);
  setStat('visits',      statsRes.error || !statsRes.data ? null : statsRes.data.visits);
}


// ─── 依 keyword / sort 過濾並重繪列表 ─────────
// 從 window._listCache 讀狀態,不重打 DB。
function renderFilteredList() {
  const cache = window._listCache;
  if (!cache) return;
  const { isBugs, data, keyword, sort } = cache;
  const listEl = document.getElementById('list');
  if (!listEl) return;

  // 關鍵字過濾:title + description 都搜,不分大小寫。
  // 空字串就當作全部通過,不用 if 判斷可讀。
  let filtered = data.filter(r => {
    if (!keyword) return true;
    const hay = (r.title + ' ' + r.description).toLowerCase();
    return hay.includes(keyword);
  });

  // 排序:JS sort 就地修改,先 slice 一份免污染 cache.data 的原順序
  filtered = filtered.slice();
  if (sort === 'oldest') {
    filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  } else if (sort === 'top') {
    // 支持度定義為 upvotes - downvotes;bugs 沒有這欄位所以走不到這條
    filtered.sort((a, b) => (b.upvotes - b.downvotes) - (a.upvotes - a.downvotes));
  } else {
    // newest
    filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">${t(keyword ? 'no_match' : 'empty')}</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(r => isBugs ? renderBugCard(r) : renderSuggestionCard(r)).join('');
  attachVoteHandlers(listEl);
}


// ─── Bug 卡片:標題 + 日期(user 要求主頁只顯示這兩項) ───
// 已解決的用 tag-resolved 綠標 + card-resolved 降不透明度,一眼區分。
function renderBugCard(r) {
  const tag = r.resolved
    ? `<span class="tag tag-resolved">${t('tag_resolved')}</span>`
    : `<span class="tag tag-bug">${t('tag_bug')}</span>`;
  const cls = r.resolved ? 'card card-resolved' : 'card';
  return `
    <article class="${cls}">
      <a class="card-body" href="?view=detail&type=bug&id=${r.id}">
        ${tag}
        <h3 class="card-title">${esc(r.title)}</h3>
        <div class="card-meta">
          <span class="mono">#${r.id}</span>
          <span class="mono">${fmtDate(r.created_at)}</span>
        </div>
      </a>
    </article>
  `;
}


// ─── 建議卡片:標題 + 日期 + 投票列 ─────────────
// 投票列跟卡片本體分開,才不會點投票鈕時被父層 <a> 連帶點成詳情連結。
function renderSuggestionCard(r) {
  return `
    <article class="card">
      <a class="card-body" href="?view=detail&type=suggestion&id=${r.id}">
        <h3 class="card-title">${esc(r.title)}</h3>
        <div class="card-meta">
          <span class="mono">#${r.id}</span>
          <span class="mono">${fmtDate(r.created_at)}</span>
        </div>
      </a>
      ${renderVotes(r)}
    </article>
  `;
}


// ─── 投票列 HTML ──────────────────────────
// 「已投的方向」用 .voted class 標示(視覺上高亮)。
// 使用者可以隨時再點:同方向 → 取消;不同方向 → 切換。
// 因此鈕本身不 disable,交給前端邏輯管方向。
function renderVotes(r) {
  const state = getVoteState(r.id);   // 'up' | 'down' | null
  const upCls   = state === 'up'   ? 'voted' : '';
  const downCls = state === 'down' ? 'voted' : '';
  return `
    <div class="votes">
      <button data-vote="up"   data-id="${r.id}" class="${upCls}">
        <span class="vote-label">▲ ${t('upvote')}</span>
        <span class="mono" data-count>${r.upvotes}</span>
      </button>
      <button data-vote="down" data-id="${r.id}" class="${downCls}">
        <span class="vote-label">▼ ${t('downvote')}</span>
        <span class="mono" data-count>${r.downvotes}</span>
      </button>
    </div>
  `;
}


// ═══════════════════════════════════════════════
//  [詳情模式] renderDetail
// ───────────────────────────────────────────────
//  用 URL id 抓單筆,顯示標題、日期、說明、媒體。
//  suggestion 的詳情底部再放一次投票列(user 要求)。
//  找不到 / 未審核的 id → 顯示錯誤而不是白畫面。
// ═══════════════════════════════════════════════
async function renderDetail(main, type, id) {
  const table = type === 'bug' ? 'bugs' : 'suggestions';
  const backHref = `?tab=${type === 'bug' ? 'bugs' : 'suggestions'}`;

  // 骨架
  main.innerHTML = `
    <a href="${backHref}" class="back">${t('back')}</a>
    <div class="empty">${t('loading')}</div>
  `;

  // 抓資料:限定 approved=true,防止有人猜 id 看到未審核內容。
  // maybeSingle() 找不到會回 null 而不會拋錯,好處理。
  const { data, error } = await sb
    .from(table)
    .select('*')
    .eq('id', id)
    .eq('approved', true)
    .maybeSingle();

  if (error || !data) {
    main.innerHTML = `
      <a href="${backHref}" class="back">${t('back')}</a>
      <div class="empty">${t('err_prefix')}${esc(error ? error.message : 'not found')}</div>
    `;
    return;
  }

  // bug 詳情:若已解決顯示綠色 RESOLVED tag,否則顯示紅色 BUG tag
  let tag = '';
  if (type === 'bug') {
    tag = data.resolved
      ? `<span class="tag tag-resolved">${t('tag_resolved')}</span>`
      : `<span class="tag tag-bug">${t('tag_bug')}</span>`;
  }
  const media = data.media_url ? renderMedia(data.media_url) : '';
  const votes = type === 'suggestion' ? renderVotes(data) : '';

  main.innerHTML = `
    <a href="${backHref}" class="back">${t('back')}</a>
    <article class="detail">
      ${tag}
      <h1 class="detail-title">${esc(data.title)}</h1>
      <div class="detail-meta">
        <span class="mono">#${data.id}</span>
        <span class="mono">${fmtDate(data.created_at)}</span>
      </div>
      ${media}
      <div class="detail-body">${esc(data.description)}</div>
      ${votes}
    </article>
  `;

  // 詳情底部的投票鈕也要綁事件
  attachVoteHandlers(main);
}


// ═══════════════════════════════════════════════
//  [提交模式] renderSubmit
// ───────────────────────────────────────────────
//  訪客新增 bug 或 suggestion 的表單。
//  流程:
//    1. 前端限制檔案(大小 25MB / 型別 image|video)
//    2. 有選檔案 → 上傳到 storage.media,取公開 URL
//    3. INSERT 到 bugs / suggestions(不帶 approved,靠 default false)
//    4. 顯示「待審核」提示;不 redirect,讓使用者感覺送出這件事完成了
//
//  資料庫端保險:
//    - anon INSERT 政策 with check (approved = false) 擋掉夾帶 approved=true
//    - suggestions 額外擋 upvotes/downvotes 非 0
// ═══════════════════════════════════════════════
function renderSubmit(main, type) {
  const isBug = type === 'bug';
  const backHref = `?tab=${isBug ? 'bugs' : 'suggestions'}`;

  main.innerHTML = `
    <a href="${backHref}" class="back">${t('back')}</a>
    <form id="submit-form" class="form">
      <h2>${isBug ? t('form_new_bug') : t('form_new_suggestion')}</h2>

      <label>${t('f_title')}
        <input type="text" name="title" required maxlength="200">
      </label>

      <label>${t('f_desc')}
        <textarea name="description" required rows="6" maxlength="4000"></textarea>
      </label>

      <label>${t('f_media')}
        <input type="file" name="media" accept="image/*,video/*">
      </label>

      <button type="submit" class="btn">${t('submit')}</button>
      <div class="status" id="submit-status"></div>
    </form>
  `;

  document.getElementById('submit-form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const form   = ev.currentTarget;
    const status = form.querySelector('#submit-status');
    const btn    = form.querySelector('button[type=submit]');

    // 讀值,防前後空白
    const title       = form.title.value.trim();
    const description = form.description.value.trim();
    const file        = form.media.files[0];

    // UI 鎖住,防重複送出
    btn.disabled = true;
    status.className = 'status';
    status.textContent = '';

    // ── 上傳媒體(若有選檔案) ─────────────────
    let media_url = null;
    if (file) {
      // 大小 / 型別檢查:前端擋掉明顯錯誤,不必先打伺服器再被拒。
      // 25 * 1024 * 1024 = 25 MB(以 binary 為單位,跟後台 bucket limit 對齊)
      if (file.size > 25 * 1024 * 1024) {
        status.className = 'status err';
        status.textContent = t('err_size');
        btn.disabled = false;
        return;
      }
      if (!file.type.startsWith('image/') && !file.type.startsWith('video/')) {
        status.className = 'status err';
        status.textContent = t('err_type');
        btn.disabled = false;
        return;
      }

      status.textContent = t('uploading');

      // 檔名:時間戳 + 隨機 + 清理過的原檔名。時間戳讓上傳順序好排,
      // 隨機碼避免同秒撞名,清理是移除斜線/中文空白等 storage 不喜歡的字元。
      const safeName = file.name.replace(/[^\w.\-]/g, '_');
      const path = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${safeName}`;

      const up = await sb.storage
        .from('media')
        .upload(path, file, { contentType: file.type, cacheControl: '3600' });

      if (up.error) {
        status.className = 'status err';
        status.textContent = t('err_prefix') + up.error.message;
        btn.disabled = false;
        return;
      }

      // Public bucket 才拿得到 getPublicUrl;若你把 bucket 設 private 這裡要改。
      const { data: pub } = sb.storage.from('media').getPublicUrl(path);
      media_url = pub.publicUrl;
    }

    // ── 寫進資料表 ───────────────────────────
    // 為什麼走 RPC 而不是直接 insert：
    //   supabase-js v2 的 .insert() 預設會送 Prefer: return=representation,
    //   PostgREST 對剛 INSERT 的 row 做 RETURNING(等同 SELECT)才回傳。
    //   但 anon 的 SELECT policy 是 approved=true,新資料 approved=false
    //   看不到 → 直接 42501 錯誤(即使 INSERT 本身其實成功)。
    //   改走 SECURITY DEFINER RPC(跟 vote 一樣的 pattern)以擁有者身分
    //   執行,繞過 anon 的 SELECT 邊界,回傳純 id 給前端。
    status.textContent = t('submitting');
    const rpcName = isBug ? 'submit_bug' : 'submit_suggestion';
    const { error } = await sb.rpc(rpcName, {
      t_title: title,
      t_description: description,
      t_media_url: media_url
    });

    if (error) {
      status.className = 'status err';
      status.textContent = t('err_prefix') + error.message;
      btn.disabled = false;
      return;
    }

    // ── 送出成功:顯示待審核訊息、清表單、解鎖按鈕留在原頁 ──
    // 之前這裡刻意不解鎖 btn(怕重複送同一筆),但那顧慮不成立:
    //   1. 送出開頭已 btn.disabled = true,async 期間再點沒用 → 這才是真正防雙擊
    //   2. form.reset() 已把 title/description 清空 → 直接再按會被 required 擋掉
    // 所以解鎖是安全的,使用者可以連續送多筆而不必手動回列表再點「+新增」。
    status.className = 'status ok';
    status.textContent = t('submitted');
    form.reset();
    btn.disabled = false;
    // 游標放回標題欄,方便直接輸入下一筆(不強迫捲頁,避免打斷視覺)
    form.title.focus();
  });
}


// ═══════════════════════════════════════════════
//  投票邏輯 — 支援收回與切換
// ───────────────────────────────────────────────
//  設計:
//    - 用 localStorage 存目前投的方向(vote_123 = 'up' / 'down' / 未設定)
//    - 使用者互動:
//        沒投過 → 點 up   : upvotes +1  , 標記 up
//        沒投過 → 點 down : downvotes+1  , 標記 down
//        已 up  → 點 up   : upvotes -1  , 移除標記(收回)
//        已 up  → 點 down : upvotes -1 , downvotes +1(切換方向)
//        已 down→ 點 down : downvotes-1 , 移除標記(收回)
//        已 down→ 點 up   : downvotes-1 , upvotes +1(切換方向)
//    - 呼叫兩支 SECURITY DEFINER RPC:
//        vote_suggestion(sid, dir)   → +1
//        unvote_suggestion(sid, dir) → -1
//      切換方向就先 unvote 再 vote,兩支都成功才算成功。
//    - 不做 IP 防護,localStorage 就好(user 明確不強制)
// ═══════════════════════════════════════════════

// 讀取本裝置對某筆的投票方向;沒投過回 null
function getVoteState(id) {
  const v = localStorage.getItem('vote_' + id);
  return v === 'up' || v === 'down' ? v : null;
}

function setVoteState(id, dir) {
  if (dir === null) localStorage.removeItem('vote_' + id);
  else              localStorage.setItem('vote_' + id, dir);
}

// 把某容器裡所有 data-vote 鈕綁上點擊處理
function attachVoteHandlers(container) {
  container.querySelectorAll('[data-vote]').forEach(btn => {
    btn.addEventListener('click', onVote);
  });
}

// 呼叫 +1 RPC
async function rpcVote(id, dir) {
  return sb.rpc('vote_suggestion', { sid: Number(id), dir });
}
// 呼叫 -1 RPC
async function rpcUnvote(id, dir) {
  return sb.rpc('unvote_suggestion', { sid: Number(id), dir });
}

async function onVote(ev) {
  const btn = ev.currentTarget;
  const id  = btn.dataset.id;
  const dir = btn.dataset.vote;              // 'up' 或 'down'
  const prev = getVoteState(id);             // 'up' | 'down' | null

  // 先鎖 UI,避免快速連點
  const siblings = btn.parentElement.querySelectorAll('button');
  siblings.forEach(b => b.disabled = true);

  // 依 (prev, dir) 決定要做哪幾筆 delta 操作
  // ops 每筆是 [action, dir],action = 'vote' | 'unvote'
  let ops = [];
  if (prev === null) {
    ops = [['vote', dir]];
  } else if (prev === dir) {
    // 收回
    ops = [['unvote', dir]];
  } else {
    // 切換方向:先減舊、再加新
    ops = [['unvote', prev], ['vote', dir]];
  }

  // 依序執行(避免同筆 row 撞資料庫寫入序);任一失敗即中斷
  for (const [action, d] of ops) {
    const res = action === 'vote' ? await rpcVote(id, d) : await rpcUnvote(id, d);
    if (res.error) {
      siblings.forEach(b => b.disabled = false);
      alert(res.error.message);
      return;
    }
  }

  // 成功:同步 localStorage、本地票數、按鈕高亮狀態
  const newState = (prev === dir) ? null : dir;
  setVoteState(id, newState);
  applyLocalVoteDelta(btn, prev, dir);

  // 也更新 cache 內對應那筆資料的票數,避免下一次過濾/排序重繪時 UI 倒退
  syncCacheVote(id, prev, dir);

  // 解鎖(不 disable 讓使用者能收回或再改)
  siblings.forEach(b => b.disabled = false);

  // 更新兩顆鈕的 voted 樣式
  siblings.forEach(b => {
    b.classList.toggle('voted', b.dataset.vote === newState);
  });
}

// 依 (prev, dir) 在本地就地調整兩顆鈕上的票數顯示,不再打 SELECT
function applyLocalVoteDelta(clickedBtn, prev, dir) {
  const container = clickedBtn.parentElement;
  const upBtn   = container.querySelector('[data-vote="up"]   [data-count]');
  const downBtn = container.querySelector('[data-vote="down"] [data-count]');
  const bump = (el, delta) => { if (el) el.textContent = String(Math.max(0, Number(el.textContent) + delta)); };

  if (prev === null) {
    // 純新增
    if (dir === 'up') bump(upBtn, +1); else bump(downBtn, +1);
  } else if (prev === dir) {
    // 收回
    if (dir === 'up') bump(upBtn, -1); else bump(downBtn, -1);
  } else {
    // 切換:舊 -1、新 +1
    if (prev === 'up') { bump(upBtn, -1); bump(downBtn, +1); }
    else               { bump(downBtn, -1); bump(upBtn, +1); }
  }
}

// 同步 window._listCache 內的 upvotes / downvotes,以便排序/搜尋重繪一致
function syncCacheVote(id, prev, dir) {
  const cache = window._listCache;
  if (!cache || cache.isBugs) return;
  const row = cache.data.find(r => String(r.id) === String(id));
  if (!row) return;
  const delta = (col, d) => { row[col] = Math.max(0, (row[col] || 0) + d); };
  if (prev === null) {
    delta(dir === 'up' ? 'upvotes' : 'downvotes', +1);
  } else if (prev === dir) {
    delta(dir === 'up' ? 'upvotes' : 'downvotes', -1);
  } else {
    delta(prev === 'up' ? 'upvotes' : 'downvotes', -1);
    delta(dir  === 'up' ? 'upvotes' : 'downvotes', +1);
  }
}


// ─── 啟動 ─────────────────────────────────
// 進頁面時執行一次;之後語言切換透過 window.rerender 再叫一次。
// 等 __sdkReady:SDK 沒載到就不能 render(sb 會是 undefined)。
// common.js 也掛在同一個 Promise 上,由於 .then 依註冊順序執行,
// common.js 的 .then 會先跑(建 client),我們的 render 後跑。
window.__sdkReady
  .then(() => render())
  .catch(() => {
    // 兩支 CDN 都超時 / 失敗 → common.js 已顯示 fatal error,這裡不重複顯示。
    console.error('[app] SDK 無法載入,已顯示 fatal error');
  });
</script>
